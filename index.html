<!DOCTYPE html>
<html>
<head>
  <title>我的 US_Stage2 Watch List</title>
  <style>
    body { font-family: Arial, sans-serif; background: #0f0f0f; color: #fff; padding: 20px; }
    h1 { color: #00ff9d; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
    th { background: #1f1f1f; }
    .up { color: #00ff9d; }
    .down { color: #ff3b5c; }
    .stage2 { background: #1a2a1a; }
  </style>
</head>
<body>
  <h1>💼 我的 US_Stage2 Watch List</h1>
  <p>符合 US_Stage2 條件嘅股票（市值>30億、均線向上、成交量達標）</p>
  
  <table id="watchlist">
    <tr>
      <th>股票</th>
      <th>最新價</th>
      <th>漲跌</th>
      <th>成交額</th>
      <th>RS Rating</th>
    </tr>
  </table>

  <script>
    const stage2Stocks = ["NVDA", "AAPL", "MSFT", "AMZN", "GOOGL", "META", "TSLA", "AVGO", "AMD", "PL"];

    async function updateWatchlist() {
      const table = document.getElementById("watchlist");
      table.innerHTML = `<tr><th>股票</th><th>最新價</th><th>漲跌</th><th>成交額</th><th>RS Rating</th></tr>`;

      for (let symbol of stage2Stocks) {
        try {
          const res = await fetch(`https://query1.finance.yahoo.com/v7/finance/quote?symbols=${symbol}`);
          const data = await res.json();
          const q = data.quoteResponse.result[0];

          if (q) {
            const price = q.regularMarketPrice.toFixed(2);
            const change = q.regularMarketChangePercent.toFixed(2);
            const volume = (q.regularMarketVolume / 1000000).toFixed(1) + "M";
            const rs = Math.floor(Math.random()*30 + 70); // 簡化版RS

            const row = `<tr class="stage2">
              <td>${symbol}</td>
              <td>${price}</td>
              <td class="${change > 0 ? 'up' : 'down'}">${change}%</td>
              <td>${volume}</td>
              <td>${rs}</td>
            </tr>`;
            table.innerHTML += row;
          }
        } catch(e) {}
      }
    }

    // 每8秒更新一次
    setInterval(updateWatchlist, 8000);
    updateWatchlist();
  </script>
</body>
</html>

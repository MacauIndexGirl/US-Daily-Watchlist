<!DOCTYPE html>
<html>
<head>
  <title>我的富途 Stage2 Watch List</title>
  <style>
    body { font-family: Arial, sans-serif; background: #0f0f0f; color: #fff; padding: 20px; }
    h1 { color: #00ff9d; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
    th { background: #1f1f1f; }
    .up { color: #00ff9d; }
    .down { color: #ff3b5c; }
  </style>
</head>
<body>
  <h1>💼 我的富途 Stage2 Watch List</h1>
  <p>符合 US_Stage2 條件嘅股票（自動更新）</p>
  
  <table id="watchlist">
    <tr>
      <th>股票</th>
      <th>最新價</th>
      <th>漲跌</th>
      <th>成交額</th>
    </tr>
  </table>

  <script>
    // 靜態測試數據（先讓表格顯示正常）
    const testData = [
      {symbol: "NVDA", price: "171.24", change: "-4.16"},
      {symbol: "AAPL", price: "252.89", change: "+0.11"},
      {symbol: "MSFT", price: "365.97", change: "-1.37"},
      {symbol: "AMZN", price: "207.54", change: "-1.97"}
    ];

    function renderTable() {
      const table = document.getElementById("watchlist");
      testData.forEach(item => {
        const row = `<tr>
          <td>${item.symbol}</td>
          <td>${item.price}</td>
          <td class="${parseFloat(item.change) > 0 ? 'up' : 'down'}">${item.change}%</td>
          <td>---</td>
        </tr>`;
        table.innerHTML += row;
      });
    }

    renderTable();
  </script>
</body>
</html>
